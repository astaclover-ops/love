<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff6ea7,#ff99c8,#ffd6e7,#ffc2d1);
background-size:400% 400%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.box{
width:90%;
max-width:360px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(12px);
padding:25px;
border-radius:25px;
text-align:center;
color:#fff;
box-shadow:0 0 25px rgba(255,255,255,.4);
z-index:10;
}

img{
width:200px;
height:200px;
border-radius:20px;
object-fit:cover;
border:4px solid white;
margin-bottom:15px;
box-shadow:0 0 20px rgba(255,255,255,.6);
}

h1{
font-size:28px;
margin-bottom:10px;
}

p{
font-size:17px;
line-height:28px;
}

button{
margin-top:20px;
padding:12px 28px;
border:none;
border-radius:50px;
background:white;
color:#ff3d7f;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.heart{
position:fixed;
top:-20px;
font-size:24px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-20px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}
</style>
</head>

<body>

<audio id="music" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="box">

<img src="foto.png">

<h1>❤️ Hai Sayang ❤️</h1>

<p id="text">
Aku cuma mau bilang...<br><br>
Terima kasih udah hadir di hidup aku.
Semoga kita selalu sama-sama sampai kapan pun.
Aku sayang kamu lebih dari apa pun. 🥹❤️
</p>

<button onclick="love()">Klik Aku ❤️</button>

</div>

<script>

document.body.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

function love(){
document.getElementById("text").innerHTML=
"Aku akan selalu milih kamu, hari ini, besok, lusa, sampai tua nanti. ❤️<br><br>I Love You Forever 🥹💍";
}

function buatLove(){

let love=document.createElement("div");

love.className="heart";

let emoji=["❤️","💖","💕","💗","💘","💝","💞"];

love.innerHTML=emoji[Math.floor(Math.random()*emoji.length)];

love.style.left=Math.random()*100+"vw";

love.style.fontSize=(20+Math.random()*20)+"px";

love.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(love);

setTimeout(()=>{
love.remove();
},7000);

}

setInterval(buatLove,180);

</script>

</body>
</html>
